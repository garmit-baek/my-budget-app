<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 내 가계부</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>💰 내 가계부</h1>
      <p class="subtitle">로그인이 필요합니다</p>

      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="username" placeholder="아이디 입력" autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력">
      </div>

      <div id="error-msg" class="error-msg"></div>

      <button onclick="doLogin()">로그인</button>
    </div>
  </div>

  <script>
    // 이미 로그인된 상태면 메인으로 이동
    fetch('/api/check-auth')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.loggedIn) location.href = '/';
      });

    function doLogin() {
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;
      var errorMsg = document.getElementById('error-msg');

      if (!username || !password) {
        errorMsg.textContent = '아이디와 비밀번호를 입력해주세요.';
        return;
      }

      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.success) {
          location.href = '/';
        } else {
          errorMsg.textContent = d.message;
        }
      })
      .catch(function() {
        errorMsg.textContent = '서버 오류가 발생했습니다.';
      });
    }

    // 엔터키로 로그인
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
