<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 가계부</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4a90e2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="내 가계부">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
</head>
<body>
<div class="container">

  <!-- 헤더 -->
  <div class="header-row">
    <h1>💰 내 가계부</h1>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- 탭 메뉴 -->
  <div class="tab-menu">
    <button class="tab-btn active" onclick="showTab('home')">🏠 홈</button>
    <button class="tab-btn" onclick="showTab('stats')">📊 통계</button>
    <button class="tab-btn" onclick="showTab('calendar')">📅 달력</button>
    <button class="tab-btn" onclick="showTab('settings')">⚙️ 설정</button>
  </div>

  <!-- ── 홈 탭 ── -->
  <div id="tab-home" class="tab-content">
    <div class="form-box">
      <h2>거래 추가</h2>
      <div class="form-row">
        <select id="type" onchange="filterCategories()">
          <option value="expense">지출</option>
          <option value="income">수입</option>
        </select>
        <input type="number" id="amount" placeholder="금액 (원)">
      </div>
      <div class="form-row">
        <select id="account"><option value="">계정 선택</option></select>
        <select id="category"><option value="">카테고리 선택</option></select>
      </div>
      <div class="form-row">
        <input type="date" id="date">
        <input type="text" id="description" placeholder="메모 (선택사항)">
      </div>
      <button onclick="addTransaction()">추가하기</button>
    </div>

    <div class="summary-box">
      <div class="summary income"><span>총 수입</span><span id="total-income">0원</span></div>
      <div class="summary expense"><span>총 지출</span><span id="total-expense">0원</span></div>
      <div class="summary balance"><span>잔액</span><span id="balance">0원</span></div>
    </div>

    <div class="list-box">
      <div class="list-header">
        <h2>거래 내역</h2>
        <div class="download-btns">
          <button class="dl-btn csv" onclick="downloadCSV()">CSV 다운로드</button>
          <button class="dl-btn excel" onclick="downloadExcel()">엑셀 다운로드</button>
        </div>
      </div>
      <div id="transactions-list"></div>
    </div>

    <div class="ai-box">
      <h2>🤖 AI 분석</h2>
      <div class="form-row">
        <input type="text" id="ai-question" placeholder="예: 이번달 식비가 얼마야?">
        <button onclick="askAI()">물어보기</button>
      </div>
      <div id="ai-answer"></div>
    </div>
  </div>

  <!-- ── 통계 탭 ── -->
  <div id="tab-stats" class="tab-content" style="display:none">
    <div class="form-box">
      <h2>📊 통계 조회</h2>
      <div class="form-row">
        <select id="stats-period">
          <option value="monthly">월별</option>
          <option value="quarterly">분기별</option>
          <option value="yearly">연간</option>
        </select>
        <select id="stats-year"></select>
        <select id="stats-month">
          <option value="1">1월</option><option value="2">2월</option>
          <option value="3">3월</option><option value="4">4월</option>
          <option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option>
          <option value="9">9월</option><option value="10">10월</option>
          <option value="11">11월</option><option value="12">12월</option>
        </select>
      </div>
      <button onclick="loadStats()">조회하기</button>
    </div>
    <div class="summary-box" id="stats-summary" style="display:none">
      <div class="summary income"><span>수입</span><span id="stats-income">0원</span></div>
      <div class="summary expense"><span>지출</span><span id="stats-expense">0원</span></div>
      <div class="summary balance"><span>잔액</span><span id="stats-balance">0원</span></div>
    </div>
    <div class="list-box" id="stats-category-box" style="display:none">
      <h2>📂 카테고리별 지출</h2>
      <div id="stats-category"></div>
    </div>
    <div class="list-box" id="stats-account-box" style="display:none">
      <h2>💳 계정과목별 통계</h2>
      <div id="stats-account"></div>
    </div>
    <div class="list-box" id="stats-trend-box" style="display:none">
      <h2>📈 기간별 추이</h2>
      <div id="stats-trend"></div>
    </div>
  </div>

  <!-- ── 달력 탭 ── -->
  <div id="tab-calendar" class="tab-content" style="display:none">
    <div class="form-box">
      <div class="calendar-nav">
        <button class="nav-btn" onclick="changeCalendarMonth(-1)">◀</button>
        <span id="calendar-title" class="calendar-title"></span>
        <button class="nav-btn" onclick="changeCalendarMonth(1)">▶</button>
      </div>
    </div>
    <div class="summary-box">
      <div class="summary income"><span>이번달 수입</span><span id="cal-income">0원</span></div>
      <div class="summary expense"><span>이번달 지출</span><span id="cal-expense">0원</span></div>
      <div class="summary balance"><span>잔액</span><span id="cal-balance">0원</span></div>
    </div>
    <div class="list-box"><div id="calendar-grid"></div></div>
    <div class="list-box" id="day-detail-box" style="display:none">
      <h2 id="day-detail-title"></h2>
      <div id="day-detail-list"></div>
    </div>
  </div>

  <!-- ── 설정 탭 ── -->
  <div id="tab-settings" class="tab-content" style="display:none">

    <!-- 계정과목 관리 -->
    <div class="form-box">
      <h2>💳 계정과목 관리</h2>
      <div class="form-row">
        <input type="text" id="new-account" placeholder="새 계정 이름 입력">
        <button onclick="addAccount()">추가</button>
      </div>
      <div id="account-list"></div>
    </div>

    <!-- 카테고리 관리 -->
    <div class="form-box">
      <h2>📂 카테고리 관리</h2>
      <div class="form-row">
        <select id="new-category-type">
          <option value="expense">지출</option>
          <option value="income">수입</option>
        </select>
        <input type="text" id="new-category" placeholder="새 카테고리 이름 입력">
        <button onclick="addCategory()">추가</button>
      </div>
      <div class="setting-section">
        <div class="setting-section-title">지출 카테고리</div>
        <div id="expense-category-list"></div>
      </div>
      <div class="setting-section">
        <div class="setting-section-title">수입 카테고리</div>
        <div id="income-category-list"></div>
      </div>
    </div>

  </div>

</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(function() { console.log('SW 등록 완료'); })
        .catch(function(err) { console.log('SW 오류:', err); });
    }
  </script>

</body>
</html>
